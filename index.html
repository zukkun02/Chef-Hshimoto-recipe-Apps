<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>happy food</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<style>
  body { margin: 0; }
  .paper-wrap { min-height: 100vh; padding: 0 0 80px; }

  /* ── Topbar ─────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,246,236,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1080px; margin: 0 auto;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    font-size: 22px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--sumi);
  }
  .brand .logo {
    height: 44px; width: auto;
    display: block;
    mix-blend-mode: multiply;
  }
  .brand-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px; font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--sumi);
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 24px 20px; }

  /* ── Search & Filter ─────────────────────────── */
  .toolbar { margin-bottom: 20px; }
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-input {
    width: 100%; padding: 14px 16px 14px 44px;
    border: 1px solid var(--line); border-radius: var(--r-md);
    background: #fff; color: var(--sumi);
    font-family: 'Noto Serif JP', serif; font-size: 15px;
    outline: none; transition: border-color .15s, box-shadow .15s;
    box-sizing: border-box;
  }
  .search-input:focus {
    border-color: var(--shu); box-shadow: 0 0 0 3px var(--shu-soft);
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); color: var(--muted);
    font-size: 18px; pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: 0; cursor: pointer;
    color: var(--muted); font-size: 18px;
    padding: 4px 8px;
  }
  .search-clear:hover { color: var(--shu); }

  .filter-group { margin-bottom: 10px; }
  .filter-label {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; margin-right: 10px;
    text-transform: uppercase;
  }
  .filter-chips { display: inline-flex; flex-wrap: wrap; gap: 6px; }
  .filter-chip {
    padding: 5px 12px; border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff; color: var(--sumi-3);
    font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    cursor: pointer; transition: all .15s;
    font-weight: 500;
  }
  .filter-chip:hover { border-color: var(--shu); color: var(--shu); }
  .filter-chip.active {
    background: var(--shu); border-color: var(--shu); color: #fff;
  }
  .filter-chip.tea.active { background: var(--tea); border-color: var(--tea); }
  .filter-count {
    margin-left: 6px; opacity: 0.7; font-size: 10px;
  }
  .result-count {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; color: var(--muted);
    margin: 16px 0 12px;
  }

  /* ── Grid & Cards ────────────────────────────── */
  .grid {
    display: grid; gap: 20px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 22px; } }
  @media (min-width: 960px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 1px 0 rgba(29,26,22,0.04);
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(29,26,22,0.08); }
  .card-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
    background: var(--kinari);
  }
  .card-img-fallback {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Shippori Mincho', serif; color: var(--shu);
    font-size: 64px; font-weight: 700;
  }
  .card-body { padding: 14px 16px 18px; }
  .chip {
    display: inline-block; padding: 3px 10px;
    border-radius: 999px; font-size: 11px;
    background: var(--shu-soft); color: var(--shu-deep);
    font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
    letter-spacing: 0.06em; margin-right: 6px;
  }
  .chip.tea { background: rgba(122,102,67,0.12); color: var(--tea); }
  .card-title {
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    font-size: 19px; font-weight: 600;
    margin: 10px 0 6px; color: var(--sumi);
    line-height: 1.4;
  }
  .card-subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; color: var(--muted);
    margin: 0 0 8px; letter-spacing: 0.04em;
  }
  .card-summary {
    font-size: 13px; color: var(--sumi-3); margin: 0;
    line-height: 1.65; font-family: 'Noto Sans JP', sans-serif;
  }
  .card-meta {
    display: flex; gap: 14px; margin-top: 12px;
    font-size: 11px; color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .card-meta span::before { content: '· '; }
  .card-meta span:first-child::before { content: ''; }

  /* ── Detail ───────────────────────────────────── */
  .detail-hero { position: relative; }
  .detail-hero img,
  .detail-hero .card-img-fallback {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    background: var(--kinari);
  }
  .back-btn {
    position: absolute; top: 16px; left: 16px;
    background: rgba(250,246,236,0.92);
    border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; cursor: pointer;
    color: var(--sumi); backdrop-filter: blur(6px);
  }
  .detail-card {
    background: #fff; border: 1px solid var(--line);
    border-radius: var(--r-lg); overflow: hidden;
  }
  .detail-body { padding: 24px 24px 32px; }
  .detail-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 30px; font-weight: 700; margin: 0 0 6px;
    color: var(--sumi); line-height: 1.3;
  }
  .detail-subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; color: var(--muted);
    margin: 0 0 18px; letter-spacing: 0.06em;
  }
  .detail-summary {
    font-size: 15px; line-height: 1.85;
    color: var(--sumi-2); margin: 12px 0 24px;
    font-family: 'Noto Serif JP', serif;
  }
  .section {
    margin: 26px 0 0; padding-top: 22px;
    border-top: 1px solid var(--kinari-deep);
  }
  .section h3 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px; margin: 0 0 14px;
    color: var(--shu); font-weight: 600;
    letter-spacing: 0.06em;
  }
  .section-body {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; line-height: 1.95;
    color: var(--sumi-2); white-space: pre-wrap;
  }
  .meta-row {
    display: flex; gap: 24px; flex-wrap: wrap;
    margin: 16px 0 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; color: var(--sumi-3);
  }
  .meta-row .label { color: var(--muted); margin-right: 6px; }
  .video-link {
    display: inline-block; padding: 10px 16px;
    background: var(--shu-soft); color: var(--shu-deep);
    text-decoration: none; border-radius: var(--r-md);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 600;
    margin-top: 8px;
  }
  .chef-box {
    background: var(--kinari);
    border-left: 3px solid var(--shu);
    padding: 14px 16px; border-radius: 0 var(--r-md) var(--r-md) 0;
    font-family: 'Noto Serif JP', serif; font-size: 14px;
    color: var(--sumi-2); line-height: 1.8;
  }
  .origin-box {
    background: rgba(122,102,67,0.06);
    padding: 14px 16px; border-radius: var(--r-md);
    font-family: 'Noto Serif JP', serif; font-size: 13px;
    color: var(--sumi-3); line-height: 1.85;
  }
  .cta-bar {
    margin: 28px 0 4px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--shu); color: #fff;
    border: 0; border-radius: var(--r-md);
    padding: 14px 24px; font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 600; cursor: pointer;
    transition: background .15s;
    min-height: 48px;
  }
  .btn-primary:hover { background: var(--shu-deep); }

  /* ── Empty / Loading / NoResults ─────────────── */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--sumi-3);
  }
  .empty-icon {
    font-family: 'Shippori Mincho', serif;
    font-size: 64px; color: var(--shu);
    margin-bottom: 16px; opacity: 0.5;
  }
  .empty h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px; margin: 0 0 10px;
    color: var(--sumi);
  }
  .empty p {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; line-height: 1.8;
    color: var(--sumi-3); max-width: 460px;
    margin: 0 auto;
  }
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
  }

  /* ── Cooking mode (1工程1画面) ────────────────── */
  .cook-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--washi);
    display: flex; flex-direction: column;
  }
  .cook-header {
    padding: 18px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    background: #fff;
  }
  .cook-progress {
    display: flex; flex-direction: column; gap: 8px; flex: 1; max-width: 480px;
  }
  .cook-title {
    font-family: 'Shippori Mincho', serif; font-size: 14px;
    color: var(--sumi-3); margin: 0;
  }
  .cook-progress-bar {
    width: 100%; height: 4px; background: var(--kinari-deep);
    border-radius: 2px; overflow: hidden;
  }
  .cook-progress-fill {
    height: 100%; background: var(--shu);
    transition: width .35s ease;
  }
  .cook-stepnum {
    font-family: 'Shippori Mincho', serif;
    color: var(--shu); font-weight: 700;
  }
  .cook-close {
    background: none; border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 14px;
    cursor: pointer; color: var(--sumi-3);
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  }
  .cook-body {
    flex: 1; padding: 40px 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    max-width: 720px; margin: 0 auto;
    text-align: center;
  }
  .cook-stepnum-big {
    font-family: 'Shippori Mincho', serif;
    color: var(--shu); font-size: 18px;
    font-weight: 600; letter-spacing: 0.2em;
    margin-bottom: 12px;
  }
  .cook-step-text {
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    font-size: 28px; line-height: 1.7;
    color: var(--sumi); font-weight: 500;
    max-width: 640px;
  }
  @media (max-width: 600px) {
    .cook-step-text { font-size: 22px; line-height: 1.7; }
  }
  .cook-tip {
    margin-top: 28px; padding: 12px 16px;
    background: var(--kinari);
    border-radius: var(--r-md);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--sumi-3); font-size: 13px;
    line-height: 1.7; max-width: 560px;
  }
  .cook-tip-label {
    color: var(--shu); font-weight: 600;
    margin-right: 6px; font-size: 12px;
  }
  .cook-foot {
    padding: 18px 24px; border-top: 1px solid var(--line);
    background: #fff;
    display: flex; gap: 12px; justify-content: space-between;
    align-items: center; max-width: 720px; margin: 0 auto; width: 100%;
    box-sizing: border-box;
  }
  .cook-nav-btn {
    background: #fff; border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 14px 22px;
    cursor: pointer; min-height: 50px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; color: var(--sumi);
    font-weight: 600; flex: 1;
  }
  .cook-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .cook-nav-btn:hover:not(:disabled) {
    background: var(--kinari); border-color: var(--shu-soft);
  }
  .cook-nav-btn.primary {
    background: var(--shu); color: #fff; border-color: var(--shu);
  }
  .cook-nav-btn.primary:hover:not(:disabled) { background: var(--shu-deep); }
  .cook-wakelock {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .cook-wakelock input { margin: 0; }
</style>
</head>
<body class="paper">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   ヘルパー
   ============================================================ */

// "1. step text\n2. another\n3. ..." を配列に分解
function parseSteps(markdown) {
  if (!markdown) return [];
  const lines = markdown.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const steps = [];
  let current = null;
  for (const line of lines) {
    const m = line.match(/^(\d+)\.\s+(.+)$/);
    if (m) {
      if (current) steps.push(current);
      current = m[2];
    } else if (current) {
      current += ' ' + line;
    }
  }
  if (current) steps.push(current);
  return steps;
}

// 全角・半角・大文字小文字を正規化
function normalize(s) {
  return (s || '').toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g,
    ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}

/* ============================================================
   コンポーネント
   ============================================================ */

function Header() {
  return (
    <header className="topbar">
      <div className="topbar-inner">
        <a href="/" className="brand" onClick={(e) => { e.preventDefault(); window.scrollTo({top:0,behavior:'smooth'}); }} style={{textDecoration:'none'}}>
          <img className="logo" src="/assets/logo.jpg" alt="happy food" />
          <span className="brand-text">happy food</span>
        </a>
      </div>
    </header>
  );
}

function MainImage({ src, title }) {
  const [errored, setErrored] = useState(false);
  if (!src || errored) {
    return (
      <div className="card-img card-img-fallback">
        {(title || 'h').slice(0, 1)}
      </div>
    );
  }
  return <img className="card-img" src={src} alt={title} onError={() => setErrored(true)} />;
}

function Card({ recipe, onClick }) {
  return (
    <article className="card" onClick={onClick}>
      <MainImage src={recipe.image} title={recipe.title} />
      <div className="card-body">
        {recipe.category && <span className="chip">{recipe.category}</span>}
        {(recipe.region || []).slice(0, 1).map(r => (
          <span key={r} className="chip tea">{r}</span>
        ))}
        <h2 className="card-title">{recipe.title}</h2>
        {recipe.subtitle && <p className="card-subtitle">{recipe.subtitle}</p>}
        {recipe.summary && <p className="card-summary">{recipe.summary}</p>}
        <div className="card-meta">
          {recipe.cooking_time != null && <span>調理 {recipe.cooking_time}分</span>}
          {recipe.servings != null && <span>{recipe.servings}人分</span>}
        </div>
      </div>
    </article>
  );
}

function SearchBar({ value, onChange }) {
  return (
    <div className="search-wrap">
      <span className="search-icon">⌕</span>
      <input
        type="text"
        className="search-input"
        placeholder="レシピを検索（例: 鶏、四川、揚げ物…）"
        value={value}
        onChange={e => onChange(e.target.value)}
      />
      {value && (
        <button className="search-clear" onClick={() => onChange('')} title="クリア">✕</button>
      )}
    </div>
  );
}

function FilterChips({ label, options, selected, onToggle, variant }) {
  if (options.length === 0) return null;
  return (
    <div className="filter-group">
      <span className="filter-label">{label}</span>
      <div className="filter-chips">
        {options.map(opt => (
          <button
            key={opt.value}
            className={`filter-chip ${variant || ''} ${selected.includes(opt.value) ? 'active' : ''}`}
            onClick={() => onToggle(opt.value)}
          >
            {opt.value}
            <span className="filter-count">{opt.count}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function EmptyState() {
  return (
    <div className="empty">
      <img src="/assets/logo.jpg" alt="happy food"
           style={{height: 80, marginBottom: 16, opacity: 0.6, mixBlendMode: 'multiply'}} />
      <h2>レシピを準備中です</h2>
      <p>
        橋本先生が手書きで残してきたレシピを、こちらに少しずつ並べていきます。<br/>
        公開されたレシピがここに掲載されます。
      </p>
    </div>
  );
}

function NoResults({ onClear }) {
  return (
    <div className="empty">
      <div className="empty-icon">∅</div>
      <h2>該当するレシピが見つかりません</h2>
      <p>検索キーワードやフィルタを変えてみてください。</p>
      <button className="btn-primary" style={{marginTop:18}} onClick={onClear}>条件をクリア</button>
    </div>
  );
}

function Loading() {
  return <div className="loading">読み込み中…</div>;
}

function Section({ title, children }) {
  if (!children || (typeof children === 'string' && !children.trim())) return null;
  return (
    <div className="section">
      <h3>{title}</h3>
      <div className="section-body">{children}</div>
    </div>
  );
}

/* ============================================================
   調理モード（1工程1画面）
   ============================================================ */

function CookingMode({ recipe, onClose }) {
  const steps = useMemo(() => parseSteps(recipe.steps_md), [recipe.steps_md]);
  const [idx, setIdx] = useState(0);
  const [wakeLock, setWakeLock] = useState(false);
  const wakeRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowRight' && idx < steps.length - 1) setIdx(i => i + 1);
      else if (e.key === 'ArrowLeft' && idx > 0) setIdx(i => i - 1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx, steps.length, onClose]);

  useEffect(() => {
    if (wakeLock && 'wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(lock => { wakeRef.current = lock; }).catch(() => {});
    } else if (wakeRef.current) {
      wakeRef.current.release().catch(() => {});
      wakeRef.current = null;
    }
    return () => {
      if (wakeRef.current) {
        wakeRef.current.release().catch(() => {});
        wakeRef.current = null;
      }
    };
  }, [wakeLock]);

  if (steps.length === 0) {
    return (
      <div className="cook-overlay">
        <div className="cook-body">
          <p className="cook-step-text">調理手順が登録されていません</p>
          <button className="cook-nav-btn primary" style={{marginTop:24}} onClick={onClose}>戻る</button>
        </div>
      </div>
    );
  }

  const isLast = idx === steps.length - 1;
  const isFirst = idx === 0;
  const progress = ((idx + 1) / steps.length) * 100;

  return (
    <div className="cook-overlay">
      <div className="cook-header">
        <div className="cook-progress">
          <p className="cook-title">{recipe.title} ・ 調理中</p>
          <div className="cook-progress-bar">
            <div className="cook-progress-fill" style={{width: `${progress}%`}}></div>
          </div>
        </div>
        <button className="cook-close" onClick={onClose}>✕ 終了</button>
      </div>

      <div className="cook-body">
        <div className="cook-stepnum-big">
          STEP <span className="cook-stepnum">{idx + 1}</span> / {steps.length}
        </div>
        <div className="cook-step-text">{steps[idx]}</div>

        {idx === 0 && recipe.tips_md && (
          <div className="cook-tip">
            <span className="cook-tip-label">⚑ 全体のコツ</span>
            {recipe.tips_md.split('\n').slice(0, 2).join(' ／ ').replace(/^・/g, '').replace(/\n・/g, ' ／ ')}
          </div>
        )}
      </div>

      <div className="cook-foot">
        <button className="cook-nav-btn" disabled={isFirst} onClick={() => setIdx(i => Math.max(0, i - 1))}>
          ← 前へ
        </button>
        <label className="cook-wakelock">
          <input type="checkbox" checked={wakeLock} onChange={e => setWakeLock(e.target.checked)} />
          画面常時オン
        </label>
        {isLast ? (
          <button className="cook-nav-btn primary" onClick={onClose}>完成！</button>
        ) : (
          <button className="cook-nav-btn primary" onClick={() => setIdx(i => Math.min(steps.length - 1, i + 1))}>
            次へ →
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   詳細
   ============================================================ */

function Detail({ slug, onBack }) {
  const [recipe, setRecipe] = useState(null);
  const [errored, setErrored] = useState(false);
  const [cooking, setCooking] = useState(false);

  useEffect(() => {
    fetch(`/data/recipes/${slug}.json`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(setRecipe)
      .catch(() => setErrored(true));
  }, [slug]);

  useEffect(() => { window.scrollTo({top: 0, behavior: 'smooth'}); }, [slug]);

  if (errored) return (
    <div className="container">
      <button className="back-btn" style={{position:'static',marginBottom:20}} onClick={onBack}>← 戻る</button>
      <div className="empty"><h2>レシピが見つかりません</h2></div>
    </div>
  );
  if (!recipe) return <Loading />;

  const hasSteps = parseSteps(recipe.steps_md).length > 0;

  return (
    <div className="container">
      <div className="detail-card">
        <div className="detail-hero">
          <MainImage src={recipe.image} title={recipe.title} />
          <button className="back-btn" onClick={onBack}>← 一覧へ</button>
        </div>
        <div className="detail-body">
          {recipe.category && <span className="chip">{recipe.category}</span>}
          {(recipe.region || []).map(r => <span key={r} className="chip tea">{r}</span>)}
          <h1 className="detail-title">{recipe.title}</h1>
          {recipe.subtitle && <p className="detail-subtitle">{recipe.subtitle}</p>}
          {recipe.summary && <p className="detail-summary">{recipe.summary}</p>}

          <div className="meta-row">
            {recipe.cooking_time != null && <div><span className="label">調理時間</span>{recipe.cooking_time}分</div>}
            {recipe.servings != null && <div><span className="label">人数</span>{recipe.servings}人分</div>}
            {recipe.source_year_month && <div><span className="label">原典</span>{recipe.source_year_month}</div>}
          </div>

          {hasSteps && (
            <div className="cta-bar">
              <button className="btn-primary" onClick={() => setCooking(true)}>▶ 調理を始める</button>
            </div>
          )}

          <Section title="材料">{recipe.ingredients_md}</Section>
          <Section title="下ごしらえ">{recipe.preparation_md}</Section>
          <Section title="調理手順">{recipe.steps_md}</Section>
          <Section title="コツ・ポイント">{recipe.tips_md}</Section>

          {recipe.chef_comment_md && (
            <div className="section">
              <h3>シェフコメント</h3>
              <div className="chef-box">{recipe.chef_comment_md}</div>
            </div>
          )}

          {recipe.origin_column_md && (
            <div className="section">
              <h3>料理の由来・コラム</h3>
              <div className="origin-box">{recipe.origin_column_md}</div>
            </div>
          )}

          {recipe.video_url && (
            <div className="section">
              <h3>動画</h3>
              <a className="video-link" href={recipe.video_url} target="_blank" rel="noreferrer">動画を見る ↗</a>
            </div>
          )}
        </div>
      </div>

      {cooking && <CookingMode recipe={recipe} onClose={() => setCooking(false)} />}
    </div>
  );
}

/* ============================================================
   一覧 + 検索 + フィルタ
   ============================================================ */

function ListView({ recipes, onSelect }) {
  const [query, setQuery] = useState('');
  const [selCats, setSelCats] = useState([]);
  const [selRegs, setSelRegs] = useState([]);

  // カテゴリ・地方の集計
  const { categories, regions } = useMemo(() => {
    const catMap = {}, regMap = {};
    for (const r of recipes) {
      if (r.category) catMap[r.category] = (catMap[r.category] || 0) + 1;
      for (const reg of (r.region || [])) regMap[reg] = (regMap[reg] || 0) + 1;
    }
    return {
      categories: Object.entries(catMap).map(([value, count]) => ({value, count}))
        .sort((a, b) => b.count - a.count),
      regions: Object.entries(regMap).map(([value, count]) => ({value, count}))
        .sort((a, b) => b.count - a.count)
    };
  }, [recipes]);

  // フィルタリング
  const filtered = useMemo(() => {
    const q = normalize(query.trim());
    return recipes.filter(r => {
      if (selCats.length > 0 && !selCats.includes(r.category)) return false;
      if (selRegs.length > 0) {
        const recRegs = r.region || [];
        if (!selRegs.some(s => recRegs.includes(s))) return false;
      }
      if (q) {
        const hay = normalize([
          r.title, r.subtitle, r.summary, r.category,
          ...(r.region || [])
        ].filter(Boolean).join(' '));
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [recipes, query, selCats, selRegs]);

  const toggle = (list, setter) => (v) =>
    setter(list.includes(v) ? list.filter(x => x !== v) : [...list, v]);

  const clearAll = () => { setQuery(''); setSelCats([]); setSelRegs([]); };

  const isFiltered = query || selCats.length || selRegs.length;

  return (
    <div className="container">
      <div className="toolbar">
        <SearchBar value={query} onChange={setQuery} />
        <FilterChips label="カテゴリ" options={categories} selected={selCats}
                     onToggle={toggle(selCats, setSelCats)} />
        <FilterChips label="地方・流派" options={regions} selected={selRegs}
                     onToggle={toggle(selRegs, setSelRegs)} variant="tea" />
        {isFiltered && (
          <div className="result-count">
            {filtered.length}件のレシピ
            {(selCats.length || selRegs.length || query) && (
              <button className="filter-chip" style={{marginLeft:10}} onClick={clearAll}>
                条件をクリア
              </button>
            )}
          </div>
        )}
      </div>

      {filtered.length === 0 ? (
        <NoResults onClear={clearAll} />
      ) : (
        <div className="grid">
          {filtered.map(r => (
            <Card key={r.slug} recipe={r} onClick={() => onSelect(r.slug)} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   ルート
   ============================================================ */

function App() {
  const [recipes, setRecipes] = useState(null);
  const [view, setView] = useState({ page: 'list', slug: null });

  useEffect(() => {
    fetch('/data/index.json')
      .then(r => r.ok ? r.json() : { recipes: [] })
      .then(d => setRecipes(d.recipes || []))
      .catch(() => setRecipes([]));
  }, []);

  // 詳細→一覧へ戻ったときに必ず最上部までスクロール（検索バーが見える状態を担保）
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'auto' });
  }, [view.page, view.slug]);

  return (
    <div className="paper-wrap">
      <Header />
      {view.page === 'list' && (
        recipes === null ? <Loading /> :
        recipes.length === 0 ? <EmptyState /> :
        <ListView recipes={recipes} onSelect={slug => setView({ page: 'detail', slug })} />
      )}
      {view.page === 'detail' && (
        <Detail slug={view.slug} onBack={() => setView({ page: 'list', slug: null })} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
