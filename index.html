<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レシピ紹介アプリ UIモック</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1d1f29;
      --sub: #667085;
      --line: #e6e8ef;
      --accent: #ff6b2d;
      --accent-soft: #fff1eb;
      --chef: #1f6feb;
      --shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px 24px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -12px -12px 12px;
      padding: 12px;
      background: rgba(246, 247, 251, 0.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--sub);
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(16, 24, 40, 0.11);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 10px;
    }

    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: #f1f3f9;
      color: #4b5567;
      margin-bottom: 8px;
    }

    .card h3 {
      font-size: 16px;
      margin: 0 0 6px;
    }

    .card p {
      margin: 0;
      color: var(--sub);
      font-size: 13px;
    }

    .detail-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .detail-head {
      position: relative;
    }

    .detail-head img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      cursor: pointer;
    }

    .detail-body {
      padding: 14px 12px 18px;
    }

    .detail-title {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .section h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    ul, ol {
      margin: 0;
      padding-left: 18px;
    }

    li + li {
      margin-top: 6px;
    }

    .chef-box {
      border: 1px solid #dbe9ff;
      background: #f4f8ff;
      border-radius: 12px;
      padding: 10px 12px;
      color: #1b3f73;
    }

    .video-link {
      display: inline-block;
      padding: 10px 14px;
      background: var(--accent-soft);
      color: #9d2f00;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      min-height: 44px;
      line-height: 24px;
    }

    .comment-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fcfcfe;
    }

    .comment-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--sub);
    }

    .reply {
      margin-top: 8px;
      margin-left: 12px;
      border-left: 3px solid #e9eefc;
      padding-left: 10px;
      color: #475467;
      font-size: 13px;
    }

    .reply-chef {
      border-left-color: #b7d2ff;
    }

    .form-row {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }

    .btn.secondary {
      background: #eef2ff;
      color: #273580;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      color: var(--sub);
      font-size: 14px;
      margin: 0;
    }

    @media (min-width: 600px) {
      .app {
        padding: 16px 16px 28px;
      }

      .header {
        margin: -16px -16px 16px;
        padding: 14px 16px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .card img {
        height: 150px;
      }
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">シェフのレシピサロン</h1>
      <p class="subtitle">MVP UIモック（一覧 / 詳細 / コメント / 返信）</p>
    </header>

    <main>
      <section id="recipe-list-view">
        <div id="recipe-list" class="grid"></div>
      </section>

      <section id="recipe-detail-view" class="hidden">
        <div class="detail-wrap">
          <div class="detail-head">
            <button id="back-btn" class="back-btn" type="button">一覧へ戻る</button>
            <img id="detail-image" src="" alt="レシピ画像">
          </div>
          <div class="detail-body">
            <h2 id="detail-title" class="detail-title"></h2>
            <p id="detail-summary" class="subtitle"></p>

            <div class="section">
              <h4>材料</h4>
              <ul id="detail-ingredients"></ul>
            </div>

            <div class="section">
              <h4>作り方</h4>
              <ol id="detail-steps"></ol>
            </div>

            <div class="section">
              <h4>シェフコメント</h4>
              <div id="detail-chef-comment" class="chef-box"></div>
            </div>

            <div class="section">
              <h4>動画</h4>
              <a id="detail-video-link" class="video-link" href="#" target="_blank" rel="noreferrer">動画リンクを見る</a>
            </div>

            <div class="section">
              <h4>コメント</h4>
              <div id="comment-list" class="form-row"></div>
              <p id="comment-empty" class="empty hidden">まだコメントがありません。</p>

              <div class="form-row">
                <input id="new-comment-name" type="text" placeholder="名前">
                <textarea id="new-comment-text" placeholder="コメントを入力"></textarea>
                <button id="post-comment-btn" class="btn" type="button">コメント投稿</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const recipes = [
      {
        id: "r001",
        title: "鶏むね肉のやわらか塩レモン炒め",
        summary: "時短で作れる、さっぱり高たんぱくレシピ",
        category: "メイン",
        image: "https://images.unsplash.com/photo-1604909052743-94e838986d24?auto=format&fit=crop&w=1000&q=80",
        ingredients: ["鶏むね肉 1枚", "塩 ひとつまみ", "レモン汁 小さじ2", "オリーブオイル 小さじ2"],
        steps: ["鶏むね肉をそぎ切りにする", "塩をふって3分置く", "フライパンで焼き、レモン汁を加えて絡める"],
        chefComment: "火を入れすぎないのがポイントです。余熱で仕上げるとしっとりします。",
        videoUrl: "https://www.youtube.com/",
        comments: [
          {
            id: "c1",
            author: "さやか",
            text: "本当にやわらかくできました！",
            date: "2026-03-20",
            replies: [{ author: "シェフ", text: "嬉しいです。切り方が上手だったはず！", isChef: true }]
          }
        ]
      },
      {
        id: "r002",
        title: "10分で作る和風きのこパスタ",
        summary: "忙しい日の定番。バターしょうゆ香る一皿",
        category: "パスタ",
        image: "https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=1000&q=80",
        ingredients: ["パスタ 100g", "しめじ 1/2株", "バター 10g", "しょうゆ 小さじ2"],
        steps: ["パスタをゆでる", "しめじを炒める", "ゆで上がったパスタと調味料を和える"],
        chefComment: "最後に黒こしょうをしっかり振ると、味が締まっておすすめです。",
        videoUrl: "https://vimeo.com/",
        comments: []
      },
      {
        id: "r003",
        title: "ごろごろ野菜のミネストローネ",
        summary: "作り置きできる、体にやさしいスープ",
        category: "スープ",
        image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&w=1000&q=80",
        ingredients: ["玉ねぎ 1/2個", "にんじん 1/2本", "トマト缶 1/2缶", "コンソメ 小さじ1"],
        steps: ["野菜を角切りにする", "鍋で炒めてトマト缶と水を加える", "やわらかくなるまで煮る"],
        chefComment: "翌日はさらに味がなじみます。多めに作ってOKです。",
        videoUrl: "https://www.youtube.com/",
        comments: []
      }
    ];

    const listView = document.getElementById("recipe-list-view");
    const detailView = document.getElementById("recipe-detail-view");
    const recipeList = document.getElementById("recipe-list");
    const backBtn = document.getElementById("back-btn");

    const detailTitle = document.getElementById("detail-title");
    const detailSummary = document.getElementById("detail-summary");
    const detailImage = document.getElementById("detail-image");
    const detailIngredients = document.getElementById("detail-ingredients");
    const detailSteps = document.getElementById("detail-steps");
    const detailChefComment = document.getElementById("detail-chef-comment");
    const detailVideoLink = document.getElementById("detail-video-link");
    const commentList = document.getElementById("comment-list");
    const commentEmpty = document.getElementById("comment-empty");
    const newCommentName = document.getElementById("new-comment-name");
    const newCommentText = document.getElementById("new-comment-text");
    const postCommentBtn = document.getElementById("post-comment-btn");

    let currentRecipeId = null;
    let replyTargetCommentId = null;

    function renderRecipeList() {
      recipeList.innerHTML = "";
      recipes.forEach((recipe) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <img src="${recipe.image}" alt="${recipe.title}">
          <div class="card-body">
            <span class="chip">${recipe.category}</span>
            <h3>${recipe.title}</h3>
            <p>${recipe.summary}</p>
          </div>
        `;
        card.addEventListener("click", () => openRecipeDetail(recipe.id));
        recipeList.appendChild(card);
      });
    }

    function openRecipeDetail(recipeId) {
      const recipe = recipes.find((r) => r.id === recipeId);
      if (!recipe) return;

      currentRecipeId = recipeId;
      replyTargetCommentId = null;

      detailTitle.textContent = recipe.title;
      detailSummary.textContent = recipe.summary;
      detailImage.src = recipe.image;
      detailImage.alt = recipe.title;
      detailChefComment.textContent = recipe.chefComment;
      detailVideoLink.href = recipe.videoUrl;

      detailIngredients.innerHTML = recipe.ingredients.map((x) => `<li>${x}</li>`).join("");
      detailSteps.innerHTML = recipe.steps.map((x) => `<li>${x}</li>`).join("");
      renderComments();

      listView.classList.add("hidden");
      detailView.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function closeRecipeDetail() {
      detailView.classList.add("hidden");
      listView.classList.remove("hidden");
    }

    function renderComments() {
      const recipe = recipes.find((r) => r.id === currentRecipeId);
      if (!recipe) return;

      commentList.innerHTML = "";
      if (recipe.comments.length === 0) {
        commentEmpty.classList.remove("hidden");
      } else {
        commentEmpty.classList.add("hidden");
      }

      recipe.comments.forEach((comment) => {
        const item = document.createElement("div");
        item.className = "comment-item";

        const repliesHtml = comment.replies
          .map((reply) => `
            <div class="reply ${reply.isChef ? "reply-chef" : ""}">
              <strong>${reply.author}</strong>: ${reply.text}
            </div>
          `)
          .join("");

        item.innerHTML = `
          <div class="comment-meta">
            <strong>${comment.author}</strong>
            <span>${comment.date}</span>
          </div>
          <div>${comment.text}</div>
          ${repliesHtml}
          <div class="btn-row" style="margin-top: 10px;">
            <button class="btn secondary" type="button" data-action="reply" data-comment-id="${comment.id}">返信する</button>
          </div>
        `;

        item.querySelector("[data-action='reply']").addEventListener("click", (e) => {
          replyTargetCommentId = e.currentTarget.getAttribute("data-comment-id");
          newCommentText.focus();
          newCommentText.placeholder = "返信内容を入力";
        });

        commentList.appendChild(item);
      });
    }

    function postComment() {
      const recipe = recipes.find((r) => r.id === currentRecipeId);
      if (!recipe) return;

      const author = newCommentName.value.trim() || "ゲスト";
      const text = newCommentText.value.trim();
      if (!text) return;

      if (replyTargetCommentId) {
        const target = recipe.comments.find((c) => c.id === replyTargetCommentId);
        if (target) {
          target.replies.push({ author, text, isChef: false });
        }
      } else {
        recipe.comments.unshift({
          id: `c${Date.now()}`,
          author,
          text,
          date: new Date().toISOString().slice(0, 10),
          replies: []
        });
      }

      newCommentText.value = "";
      newCommentName.value = "";
      newCommentText.placeholder = "コメントを入力";
      replyTargetCommentId = null;
      renderComments();
    }

    backBtn.addEventListener("click", closeRecipeDetail);
    postCommentBtn.addEventListener("click", postComment);

    renderRecipeList();
  </script>
</body>
</html>
