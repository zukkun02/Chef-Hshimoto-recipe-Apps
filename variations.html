<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>レシピサイト — デザイン案 4方向</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<style>
  body { margin: 0; font-family: 'Noto Serif JP', serif; }
</style>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#1a1815"/>
    <text x="50" y="44" text-anchor="middle" font-family="serif" font-style="italic" font-weight="700" font-size="28" fill="#c9a961">4</text>
    <text x="50" y="68" text-anchor="middle" font-family="sans-serif" font-size="7" letter-spacing="3" fill="#c9a961">DIRECTIONS</text>
    <text x="50" y="82" text-anchor="middle" font-family="sans-serif" font-size="5" letter-spacing="2" fill="#827c70">RECIPE SITE</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screens/list.jsx"></script>
<script type="text/babel" src="screens/detail-shared.jsx"></script>
<script type="text/babel" src="screens/detail-tabs.jsx"></script>
<script type="text/babel" src="screens/cooking-mode.jsx"></script>
<script type="text/babel" src="variants/editorial.jsx"></script>
<script type="text/babel" src="variants/bold.jsx"></script>
<script type="text/babel" src="variants/dark-gourmet.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function Wrap({ children }) {
  return <IOSDevice width={402} height={874}>{children}</IOSDevice>;
}

function App() {
  return (
    <DesignCanvas>
      {/* Direction 0 — current (和モダン) for reference */}
      <DCSection id="wamodern" title="① 和モダン（既存）" subtitle="生成り＋墨＋朱、Noto Serif JP — 採用済みの基準案">
        <DCArtboard id="wm-list" label="一覧" width={402} height={874}>
          <Wrap><ListScreen layout="list" /></Wrap>
        </DCArtboard>
        <DCArtboard id="wm-detail" label="詳細" width={402} height={874}>
          <Wrap><DetailTabs /></Wrap>
        </DCArtboard>
        <DCArtboard id="wm-cook" label="料理中" width={402} height={874}>
          <Wrap><CookingMode showTimer={false} /></Wrap>
        </DCArtboard>
      </DCSection>

      {/* Direction 1 — Editorial Magazine */}
      <DCSection id="editorial" title="② Editorial — 雑誌・エディトリアル" subtitle="Kinfolk・Cherry Bombe風。純白＋オリーブ＋ワイン、Cormorant Garamond の大胆な見出し、余白を贅沢に使う">
        <DCArtboard id="ed-list" label="一覧" width={402} height={874}>
          <Wrap><EditorialList /></Wrap>
        </DCArtboard>
        <DCArtboard id="ed-detail" label="詳細" width={402} height={874}>
          <Wrap><EditorialDetail /></Wrap>
        </DCArtboard>
        <DCArtboard id="ed-cook" label="料理中" width={402} height={874}>
          <Wrap><EditorialCooking /></Wrap>
        </DCArtboard>
      </DCSection>

      {/* Direction 2 — Bold & Playful */}
      <DCSection id="bold" title="③ Bold — 元気・ポップ" subtitle="Mob Kitchen・NYT Cooking風。クリーム＋トマト＋マスタード、Space Grotesk の太字、太い黒枠と落ち影で立体的に">
        <DCArtboard id="bp-list" label="一覧" width={402} height={874}>
          <Wrap><BoldList /></Wrap>
        </DCArtboard>
        <DCArtboard id="bp-detail" label="詳細" width={402} height={874}>
          <Wrap><BoldDetail /></Wrap>
        </DCArtboard>
        <DCArtboard id="bp-cook" label="料理中" width={402} height={874}>
          <Wrap><BoldCooking /></Wrap>
        </DCArtboard>
      </DCSection>

      {/* Direction 3 — Dark Gourmet */}
      <DCSection id="gourmet" title="④ Dark Gourmet — 美食誌" subtitle="Bon Appétit・Saveur風。漆黒＋ゴールド、Playfair Display のイタリック、写真を主役にした雑誌的な体裁">
        <DCArtboard id="dg-list" label="一覧" width={402} height={874}>
          <Wrap><GourmetList /></Wrap>
        </DCArtboard>
        <DCArtboard id="dg-detail" label="詳細" width={402} height={874}>
          <Wrap><GourmetDetail /></Wrap>
        </DCArtboard>
        <DCArtboard id="dg-cook" label="料理中" width={402} height={874}>
          <Wrap><GourmetCooking /></Wrap>
        </DCArtboard>
      </DCSection>

      <DCPostIt top={140} left={20} rotate={-3} width={230}>
        各方向の <b>一覧 / 詳細 / 料理中</b> を縦に並べました。{'\n'}
        アートボード右上の ⤢ でフルスクリーン比較できます。
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
